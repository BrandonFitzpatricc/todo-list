<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Todo List</title>
</head>

<body>
    <div id="sidebar" class="sidebar">
        <button id="my-projects" class="tab my-projects">
            <img class="icon" src="./icons/projects.svg" alt="icon of a folder with subfolders" width="45" height="45">
            <div>My Projects</div>
        </button>

        <button class="tab project">
            <img class="icon" width="40" height="40" src="./icons/project.svg" alt="icon of a folder">
            <div>Lorem Ipsum Dolor</div>
        </button>

        <button class="tab project">
            <img class="icon" width="40" height="40" src="./icons/project.svg" alt="icon of a folder">
            <div>Lorem Ipsum Dolor</div>
        </button>

        <button class="tab project">
            <img class="icon" width="40" height="40" src="./icons/project.svg" alt="icon of a folder">
            <div>Lorem Ipsum Dolor</div>
        </button>

        <button id="new-project" class="tab new-project">
            <img class="icon" width="40" height="40" src="./icons/new-project.svg" alt="icon of a plus sign">
            <div>New Project</div>
        </button>
    </div>

    <div id="main-content" class="main-content">
        <div class="project">
            <div class="heading project-heading">
                <input class="name project-name" type="text" value="Project" readonly>
                <button><img class="icon" width="40" height="40" src="./icons/add-task.svg" alt="icon of a plus sign inside of a circle"></button>
                <button><img class="icon" width="40" height="40" src="./icons/edit.svg" alt="icon of a pen"></button>
                <button><img class="icon" width="40" height="40" src="./icons/delete.svg" alt="icon of a trash can"></button>
            </div>

            <hr />

            <div class="tasks">
                <div class="date-heading">March 3 2026</div>

                <hr />

                <div class="task">
                    <input class="important" type="checkbox">
                    <div class="task-name">Task 1</div>
                    <button><img class="icon" width="40" height="40" src="./icons/expand-task.svg" alt="view and edit icon"></button>
                    <button><img class="icon" width="40" height="40" src="./icons/delete.svg" alt="icon of a trash can"></button>
                </div>

                <hr />

                <div class="task">
                    <input class="semi-important" type="checkbox">
                    <div class="task-name">Task 2</div>
                    <button><img class="icon" width="40" height="40" src="./icons/expand-task.svg" alt="view and edit icon"></button>
                    <button><img class="icon" width="40" height="40" src="./icons/delete.svg" alt="icon of a trash can"></button>
                </div>

                <hr />

                <div class="task">
                    <input class="not-important" type="checkbox">
                    <div class="task-name">Task 3</div>
                    <button><img class="icon" width="40" height="40" src="./icons/expand-task.svg" alt="view and edit icon"></button>
                    <button><img class="icon" width="40" height="40" src="./icons/delete.svg" alt="icon of a trash can"></button>
                </div>

                <hr />
            </div>

            <div class="tasks">
                <div class="date">March 4 2026</div>

                <hr />

                <div class="task">
                    <input class="important" type="checkbox">
                    <div class="task-name">Task 1</div>
                    <button><img class="icon" width="40" height="40" src="./icons/expand-task.svg" alt="view and edit icon"></button>
                    <button><img class="icon" width="40" height="40" src="./icons/delete.svg" alt="icon of a trash can"></button>
                </div>

                <hr />

                <div class="task">
                    <input class="semi-important" type="checkbox">
                    <div class="task-name">Task 2</div>
                    <button><img class="icon" width="40" height="40" src="./icons/expand-task.svg" alt="view and edit icon"></button>
                    <button><img class="icon" width="40" height="40" src="./icons/delete.svg" alt="icon of a trash can"></button>
                </div>

                <hr />

                <div class="task">
                    <input class="not-important" type="checkbox">
                    <div class="task-name">Task 3</div>
                    <button><img class="icon" width="40" height="40" src="./icons/expand-task.svg" alt="view and edit icon"></button>
                    <button><img class="icon" width="40" height="40" src="./icons/delete.svg" alt="icon of a trash can"></button>
                </div>

                <hr />
            </div>
        </div>

        <div class="expanded-task">
            <div class="heading task-heading">
                <input class="not-important" type="checkbox">
                <input class="name task-name" type="text" value="Task 1" readonly>
                <button><img class="icon" width="40" height="40" src="./icons/add-task.svg" alt="icon of a plus sign inside of a circle"></button>
                <button><img class="icon" width="40" height="40" src="./icons/edit.svg" alt="icon of a pen"></button>
                <button><img class="icon" width="40" height="40" src="./icons/delete.svg" alt="icon of a trash can"></button>
            </div>

            <hr />

            <div class="task-info">
                <input class="task-date" type="date" value="2026-03-06" readonly>
                <select class="task-priority not-important" disabled>
                    <option>Not Important</option>
                    <option>Semi Important</option>
                    <option>Important</option>
                </select>
            </div>

            <hr />

            <textarea class="task-description" type="text" readonly>Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.</textarea>
        </div>
    </div>

    <dialog id="add-task-dialog" class="add-task-dialog"closedby="closerequest">
        <form id="add-task-form" class="add-task-form" action="">
            <div class="form-title">New Task</div>

            <label for="title">Title</label>
            <input id="title" class="task-title" type="text">

            <label for="description">Description</label>
            <textarea id="description" class="task-description"></textarea>

            <label for="due-date">Due Date</label>
            <input id="due-date" class="task-date" type="date">

            <label for="priority">Priority</label>
            <select id="priority" class="task-priority not-important">
                <option>Not Important</option>
                <option>Semi Important</option>
                <option>Important</option>
            </select>

            <button id="submit-task-btn" class="add-task-btn" type="button">Add Task</button>

            <button id="close-form-btn" class="close-form-btn" type="button"></button>
        </form>
    </dialog>
</body>
</html>
