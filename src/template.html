        <div class="expanded-task">
            <div class="heading task-heading">
                <input type="checkbox" class="not-important">
                <input class="task-name" type="text" value="Task 1" readonly>
                <button><img class="icon" width="40" height="40" src="./icons/add-task.svg" alt="icon of a plus sign inside of a circle"></button>
                <button><img class="icon" width="40" height="40" src="./icons/edit.svg" alt="icon of a pen"></button>
                <button><img class="icon" width="40" height="40" src="./icons/delete.svg" alt="icon of a trash can"></button>
            </div>

            <hr />

            <div class="task-info">
                <input class="task-date" type="date" value="2026-03-06">
                <select class="task-priority not-important">
                    <option>Not Important</option>
                    <option>Semi Important</option>
                    <option>Important</option>
                </select>
            </div>

            <hr />

            <textarea class="task-description" type="text" readonly>Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.</textarea>
        </div>
    </div>   

    <dialog class="add-task-dialog" id="add-task-dialog" closedby="closerequest">
        <form class="add-task-form" id="add-task-form" action="">
            <div class="form-title">New Task</div>

            <label for="title">Title</label>
            <input class="task-title" id="title" type="text">

            <label for="description">Description</label>
            <textarea class="task-description" id="description"></textarea>

            <label for="due-date">Due Date</label>
            <input class="task-date" id="due-date" type="date">

            <label for="priority">Priority</label>
            <select class="task-priority not-important" id="priority">
                <option>Not Important</option>
                <option>Semi Important</option>
                <option>Important</option>
            </select>

            <button class="add-task-btn" id="submit-task-btn" type="button">Add Task</button>

            <button class="close-form-btn" id="close-form-btn" type="button">
                <img class="icon" width="50" height="50" src="./icons/close-box.svg"></button>
        </form>
    </dialog>
