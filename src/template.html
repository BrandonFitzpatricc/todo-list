    <dialog id="new-task-dialog" class="new-task-dialog"closedby="closerequest">
        <form id="new-task-form" class="new-task-form" action="">
            <div class="form-title">New Task</div>

            <label for="task-name">Name</label>
            <input id="task-name" class="task-name" type="text" maxlength="25">

            <label for="task-description">Description</label>
            <textarea id="task-description" class="task-description" maxlength="500"></textarea>

            <label for="task-date">Date</label>
            <input id="task-date" class="task-date" type="date" value="2026-03-12">

            <label for="task-priority">Priority</label>
            <select id="task-priority" class="task-priority not-important">
                <option value="not-important">Not Important</option>
                <option value="semi-important">Semi Important</option>
                <option value="important">Important</option>
            </select>

            <button id="submit-task-btn" class="add-task-btn" type="button">Add Task</button>

            <button id="close-form-btn" class="close-form-btn" type="button"></button>
        </form>
    </dialog>
